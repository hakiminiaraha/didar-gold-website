services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: didar_gold
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: didar_gold
    volumes:
      - didar_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U didar_gold -d didar_gold"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      args:
        VITE_AUTH_API_URL: /api/auth
        VITE_AUTH_DEMO: "false"
        VITE_TRACKING_ENABLED: ${VITE_TRACKING_ENABLED:-false}
        VITE_GA4_MEASUREMENT_ID: ${VITE_GA4_MEASUREMENT_ID:-}
        VITE_GTM_ID: ${VITE_GTM_ID:-}
        VITE_META_PIXEL_ID: ${VITE_META_PIXEL_ID:-}
        VITE_LINKEDIN_PARTNER_ID: ${VITE_LINKEDIN_PARTNER_ID:-}
        VITE_CLARITY_PROJECT_ID: ${VITE_CLARITY_PROJECT_ID:-}
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 8787
      HOST: 0.0.0.0
      DATABASE_URL: postgres://didar_gold:${POSTGRES_PASSWORD}@db:5432/didar_gold
      DATABASE_SSL: "false"
      DATABASE_SEED: "true"
      UPLOADS_DIR: /app/public/uploads
      TRUST_PROXY: "true"
    ports:
      - "127.0.0.1:8787:8787"
    volumes:
      - didar_uploads:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  didar_pgdata:
  didar_uploads:
